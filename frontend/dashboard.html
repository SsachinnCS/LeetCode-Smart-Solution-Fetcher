<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #f1f1f1;
  padding: 20px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  background: rgba(255,255,255,0.06);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* HEADER */
h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}

/* STATS */
.stats {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
  color: #8ab4f8;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 12px 0;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  transition: all 0.3s ease;
}

/* HOVER ANIMATION */
.card:hover {
  transform: translateY(-5px) scale(1.02);
  background: rgba(255,255,255,0.12);
}

/* PROBLEM TEXT */
.problem {
  cursor: pointer;
  transition: 0.2s;
}

.problem:hover {
  color: #00d4ff;
}

/* BUTTON GROUP */
.actions {
  display: flex;
  gap: 10px;
}

/* BUTTONS */
button {
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.3s;
}

/* OPEN BUTTON */
.open {
  background: #4cafef;
  color: white;
}

.open:hover {
  background: #1e88e5;
}

/* REMOVE BUTTON */
.remove {
  background: #ff4d4d;
  color: white;
}

.remove:hover {
  background: #e60000;
}

/* LOGOUT */
.logout {
  margin-top: 20px;
  width: 100%;
  background: #444;
}

.logout:hover {
  background: #666;
}
</style>
</head>

<body>

<div class="container">

<h2>Dashboard</h2>

<div class="stats" id="stats"></div>
<div id="list"></div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>
const userId = localStorage.getItem("userId");

// 🚨 CHECK LOGIN FIRST
if (!userId) {
  alert("Please login first");
  window.location.href = "index.html";
}

// LOAD DATA
async function loadData() {
  try {
    console.log("User ID:", userId); // DEBUG

    const res = await fetch(`http://127.0.0.1:3001/api/save/${userId}`);
    const data = await res.json();

    console.log("Dashboard Data:", data); // DEBUG

    // ❌ If backend error
    if (!data.savedProblems) {
      document.getElementById("list").innerHTML =
        "❌ Error loading data";
      return;
    }

    // ✅ Stats
    document.getElementById("stats").innerHTML =
      `⭐ Total Saved: ${data.savedProblems.length}`;

    // ✅ If empty
    if (data.savedProblems.length === 0) {
      document.getElementById("list").innerHTML =
        "<p>No problems saved yet</p>";
      return;
    }

    // ✅ Render
    let html = "";

    data.savedProblems.forEach(p => {
      html += `
        <div class="card">
          <div class="problem" onclick="openProblem('${p}')">${p}</div>

          <div class="actions">
            <button class="open" onclick="openProblem('${p}')">Open</button>
            <button class="remove" onclick="remove('${p}')">Remove</button>
          </div>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  } catch (err) {
    console.error("Dashboard Error:", err);
    document.getElementById("list").innerHTML =
      "⚠️ Failed to load data";
  }
}

// OPEN
function openProblem(problem) {
  localStorage.setItem("selectedProblem", problem);
  window.location.href = "index.html";
}

// REMOVE
async function remove(problem) {
  try {
    await fetch("http://127.0.0.1:3001/api/save/delete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ userId, problem })
    });

    loadData();

  } catch (err) {
    alert("Failed to delete");
  }
}

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// INIT
loadData();
</script>

</body>
</html>
